<section class="grid">
  <article class="card">
    <h2>School Parking Zones</h2>
    <ul>
      <li *ngFor="let zone of parkingZones">
        <strong>{{ zone.schoolName }}</strong> - {{ zone.type }}<br />
        <small>{{ zone.location }}</small>
      </li>
    </ul>
  </article>

  <article class="card">
    <h2>Safety Recommendations</h2>
    <ul>
      <li *ngFor="let tip of tips">{{ tip.content }}</li>
    </ul>
  </article>
</section>
